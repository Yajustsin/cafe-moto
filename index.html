  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

a(36,28,21,.18);padding:10px 2px;font-family:Vazirmatn;font-size:14px;outline:none;background:transparent;color:#241C15;\">\n              <sc-for list=\"{{ catOptions }}\" as=\"co\" hint-placeholder-count=\"3\">\n                <option value=\"{{ co.id }}\">{{ co.name }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onAddProduct }}\" style=\"margin-top:24px;width:100%;padding:15px;border:none;border-radius:11px;background:linear-gradient(180deg,#FF6A2E,#DC4A12);color:#fff;font-family:Vazirmatn;font-weight:800;font-size:15px;cursor:pointer;letter-spacing:.5px;box-shadow:0 10px 26px -8px rgba(232,84,30,.6);\">{{ modalBtn }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  IMG(id){ return 'https://images.unsplash.com/'+id+'?w=240&h=240&fit=crop&q=72'; }\n  toEn(s){ return String(s).replace(/[۰-۹]/g, d => '۰۱۲۳۴۵۶۷۸۹'.indexOf(d)); }\n  money(n){ return Number(n).toLocaleString('en-US'); }\n\n  makeData(){\n    const P = (id,cat,name,en,desc,price,img,available=true,featured=false) =>\n      ({ id, cat, name, en, desc, price, img:this.IMG(img), available, featured });\n    return [\n      { id:'c1', name:'قهوه گرم', en:'HOT COFFEE', items:[\n        P('p1','c1','اسپرسو','ESPRESSO','شات غلیظ و کلاسیک',45000,'photo-1510707577719-ae7c14805e3a',true,true),\n        P('p2','c1','کاپوچینو','CAPPUCCINO','اسپرسو با فوم شیر مخملی',65000,'photo-1572442388796-11668a67e53d'),\n        P('p3','c1','لاته','LATTE','اسپرسو با شیر بافت‌دار',70000,'photo-1541167760496-1628856ab772'),\n        P('p4','c1','موکا','MOCHA','ترکیب قهوه و شکلات',78000,'photo-1509042239860-f550ce710b93'),\n        P('p5','c1','آمریکانو','AMERICANO','تلخ، ساده، جدی',50000,'photo-1495474472287-4d71bcdd2085', false),\n      ]},\n      { id:'c2', name:'قهوه سرد', en:'COLD COFFEE', items:[\n        P('p6','c2','آیس لاته','ICE LATTE','خنک و نرم',75000,'photo-1517701550927-30cf4ba1dba5'),\n        P('p7','c2','آیس آمریکانو','ICE AMERICANO','قهوه سرد و سرحال‌کننده',60000,'photo-1461023058943-07fcbe16d735'),\n        P('p8','c2','فراپه','FRAPPE','یخی، خامه‌ای و خنک',85000,'photo-1571934811356-5cc061b6821f', false),\n      ]},\n      { id:'c3', name:'دمنوش', en:'HERBAL TEA', items:[\n        P('p9','c3','چای ماسالا','MASALA CHAI','ادویه‌های گرم و معطر',55000,'photo-1497636577773-f1231844b336'),\n        P('p10','c3','دمنوش به‌لیمو','LEMON VERBENA','آرامش‌بخش و سبک',48000,'photo-1485808191679-5f86510681a2'),\n      ]},\n      { id:'c4', name:'کیک و دسر', en:'SWEETS', items:[\n        P('p11','c4','چیزکیک','CHEESECAKE','برش روز، خامه‌ای',95000,'photo-1533134242443-d4fd215305ad',true,true),\n        P('p12','c4','براونی','BROWNIE','شکلاتی و فاج',72000,'photo-1606313564200-e75d5e30476c'),\n        P('p13','c4','تیرامیسو','TIRAMISU','قهوه و ماسکارپونه',98000,'photo-1571877227200-a0d98ea607e9'),\n      ]},\n      { id:'c5', name:'صبحانه', en:'BREAKFAST', items:[\n        P('p14','c5','املت','OMELETTE','تازه و گرم',88000,'photo-1525351484163-7529414344d8'),\n        P('p15','c5','نان و پنیر','BREAD & CHEESE','ساده و خوشمزه',65000,'photo-1509440159596-0249088772ff'),\n      ]},\n    ];\n  }\n  makeOrders(){\n    const now = Date.now();\n    return [\n      { no:'2048', table:9, status:'new', name:'سارا کریمی', phone:'0912 345 6789', created: now-40000, isNew:false,\n        items:[{name:'کاپوچینو',qty:1},{name:'چیزکیک',qty:1}] },\n      { no:'2047', table:4, status:'new', name:'رضا محمدی', phone:'0935 112 4400', created: now-130000, isNew:false,\n        items:[{name:'آیس لاته',qty:2}] },\n      { no:'2045', table:7, status:'prep', name:'مینا احمدی', phone:'0910 220 1188', created: now-300000, isNew:false,\n        items:[{name:'موکا',qty:1},{name:'براونی',qty:2}] },\n      { no:'2044', table:2, status:'prep', name:'علی رضایی', phone:'0922 778 9012', created: now-540000, isNew:false,\n        items:[{name:'املت',qty:1},{name:'اسپرسو',qty:1}] },\n      { no:'2041', table:5, status:'ready', name:'نگار سلطانی', phone:'0939 556 7788', created: now-700000, isNew:false,\n        items:[{name:'چای ماسالا',qty:2}] },\n    ];\n  }\n\n  LSKEY = 'cafe_moto_admin_v1';\n  loadSaved(){ try{ const raw=localStorage.getItem(this.LSKEY); return raw?JSON.parse(raw):{}; }catch(_){ return {}; } }\n  persist(){\n    try{\n      const S=this.state;\n      localStorage.setItem(this.LSKEY, JSON.stringify({\n        mProducts:S.mProducts, tables:S.tables, bannerUrl:S.bannerUrl,\n        uploadedBanners:S.uploadedBanners, adminPass:S.adminPass,\n      }));\n    }catch(_){}\n  }\n\n  state = (() => {\n    const cats = this.makeData();\n    const flat = cats.flatMap(c => c.items.map(i => ({ ...i })));\n    const saved = this.loadSaved();\n    return {\n      view:'customer', adminTab:'board', screen:'landing', table:'7', loading:false,\n      bannerUrl: saved.bannerUrl || 'uploads/cafe_moto_top_banner_full.png',\n      uploadedBanners: saved.uploadedBanners || [], bannerErr:'',\n      cats, activeCat:'c1', search:'',\n      cart:[], name:'', phone:'', phoneErr:false, submitting:false, orderNo:'',\n      fly:null, confetti:false, badge:false,\n      orders:this.makeOrders(), bTable:'all',\n      mProducts: (saved.mProducts && saved.mProducts.length) ? saved.mProducts : flat,\n      dragId:null, overId:null,\n      showAdd:false, editId:null, npName:'', npPrice:'', npCat:'c1', npEn:'', npDesc:'', npImg:'', npFeatured:false, npImgErr:'',\n      tables: saved.tables || [1,2,3,4,5,6,7,8], copiedTable:null, qrReady:false,\n      adminPass: saved.adminPass || 'Moto123', adminAuthed:false, passInput:'', passErr:false,\n    };\n  })();\n\n  BASEURL = 'https://cafe-moto.app/t/';\n\n  save(patch){ this.setState(patch, ()=>this.persist()); }\n\n  login(){\n    if(this.state.passInput === this.state.adminPass) this.setState({adminAuthed:true, passErr:false, passInput:''});\n    else this.setState({passErr:true});\n  }\n  logout(){ this.setState({adminAuthed:false, passInput:''}); }\n\n  componentDidMount(){\n    this._t = setInterval(() => { if(this.state.view==='board') this.forceUpdate(); }, 15000);\n    if(window.qrcode) this.setState({qrReady:true});\n    else { let n=0; this._q=setInterval(()=>{ if(window.qrcode){ clearInterval(this._q); this.setState({qrReady:true}); } else if(++n>60) clearInterval(this._q); },100); }\n    this._qp = setInterval(()=>{ if(this.state.view==='admin' && this.state.adminTab==='tables') this.paintQRs(); }, 500);\n  }\n  componentWillUnmount(){ clearInterval(this._t); clearInterval(this._q); clearInterval(this._qp); }\n  componentDidUpdate(){ this.paintQRs(); }\n  paintQRs(){\n    if(!window.qrcode) return;\n    const boxes = document.querySelectorAll('div[style*=\"width: 150px\"]');\n    boxes.forEach(el=>{\n      const span = el.querySelector('span');\n      if(!span) return;\n      const num = span.textContent.trim();\n      if(!num || num.indexOf('{')>-1) return;\n      if(el.__qrNum===num) return;\n      const u = this.qrDataUrl(num, 6);\n      if(!u) return;\n      let img = el.querySelector('img.moto-qr-img');\n      if(!img){ img = document.createElement('img'); img.className='moto-qr-img'; img.style.cssText='width:118px;height:118px;image-rendering:pixelated;display:block'; el.appendChild(img); }\n      img.src = u;\n      el.__qrNum = num;\n    });\n  }\n\n  qrDataUrl(num, cell){\n    if(!window.qrcode) return '';\n    const qr = window.qrcode(0, 'M');\n    qr.addData(this.BASEURL + num);\n    qr.make();\n    return qr.createDataURL(cell || 6, 2);\n  }\n  downloadQR(num){\n    const src = this.qrDataUrl(num, 10);\n    if(!src) return;\n    const img = new Image();\n    img.onload = () => {\n      const S = 720, c = document.createElement('canvas'); c.width=S; c.height=S;\n      const ctx = c.getContext('2d');\n      ctx.fillStyle = '#fff'; ctx.fillRect(0,0,S,S);\n      ctx.imageSmoothingEnabled = false;\n      const pad = 60; ctx.drawImage(img, pad, pad, S-2*pad, S-2*pad);\n      const a = document.createElement('a');\n      a.href = c.toDataURL('image/png');\n      a.download = 'cafe-moto-table-' + num + '.png';\n      a.click();\n    };\n    img.src = src;\n  }\n  copyLink(num){\n    const link = this.BASEURL + num;\n    try{ navigator.clipboard && navigator.clipboard.writeText(link); }catch(_){}\n    this.setState({copiedTable:num});\n    clearTimeout(this._cp); this._cp = setTimeout(()=>this.setState({copiedTable:null}), 1400);\n  }\n  addTable(){ this.save(s=>({ tables:[...s.tables, (Math.max(0,...s.tables)+1)] })); }\n  delTable(num){ this.save(s=>({ tables:s.tables.filter(t=>t!==num) })); }\n  downloadAllQR(){ this.state.tables.forEach((n,i)=> setTimeout(()=>this.downloadQR(n), i*350)); }\n\n  prod(id){ return this.state.cats.flatMap(c=>c.items).find(p=>p.id===id); }\n\n  goView(v){ this.setState({ view:v }); }\n  goScreen(s){ this.setState({ screen:s }); }\n  goMenuScreen(){\n    const first = !this._menuSeen; this._menuSeen = true;\n    this.setState({ screen:'menu', loading:first });\n    if(first) setTimeout(()=>this.setState({loading:false}), 950);\n  }\n\n  addToCart(p, e){\n    if(!p.available) return;\n    try{\n      const r = e.currentTarget.getBoundingClientRect();\n      const anchor = document.getElementById('moto-cart-anchor');\n      const cr = anchor ? anchor.getBoundingClientRect() : { left:r.left, top:r.top+260, width:40, height:40 };\n      this.setState({ fly:{ x:r.left+r.width/2, y:r.top+r.height/2, tx:cr.left+cr.width-20, ty:cr.top+cr.height/2, img:p.img, phase:0 } });\n      requestAnimationFrame(()=>requestAnimationFrame(()=>this.setState(s=>s.fly?({fly:{...s.fly,phase:1}}):{})));\n      setTimeout(()=>this.setState({fly:null}), 560);\n    }catch(_){}\n    setTimeout(()=>{\n      this.setState(s=>{\n        let cart=[...s.cart]; const ex=cart.find(c=>c.id===p.id);\n        if(ex) cart=cart.map(c=>c.id===p.id?{...c,qty:c.qty+1}:c);\n        else cart.push({id:p.id,qty:1,note:''});\n        return { cart, badge:true };\n      });\n      setTimeout(()=>this.setState({badge:false}), 380);\n    }, 400);\n  }\n  inc(id){ this.setState(s=>({cart:s.cart.map(c=>c.id===id?{...c,qty:c.qty+1}:c)})); }\n  dec(id){ this.setState(s=>({cart:s.cart.map(c=>c.id===id?{...c,qty:c.qty-1}:c).filter(c=>c.qty>0)})); }\n  del(id){ this.setState(s=>({cart:s.cart.filter(c=>c.id!==id)})); }\n  note(id,v){ this.setState(s=>({cart:s.cart.map(c=>c.id===id?{...c,note:v}:c)})); }\n\n  cartCount(){ return this.state.cart.reduce((a,c)=>a+c.qty,0); }\n  cartTotal(){ return this.state.cart.reduce((a,c)=>{ const p=this.prod(c.id); return a + (p?p.price:0)*c.qty; },0); }\n\n  submit(){\n    const en = this.toEn(this.state.phone).replace(/\\s/g,'');\n    if(!/^09\\d{9}$/.test(en)){ this.setState({phoneErr:true}); return; }\n    this.setState({phoneErr:false, submitting:true});\n    setTimeout(()=>{\n      const no = String(2049 + Math.floor(Math.random()*40));\n      const items = this.state.cart.map(c=>{ const p=this.prod(c.id); return {name:p.name,qty:c.qty}; });\n      const phoneFmt = this.toEn(this.state.phone).replace(/\\s/g,'').replace(/(\\d{4})(\\d{3})(\\d{4})/, '$1 $2 $3');\n      const order = { no, table: this.toEn(this.state.table)||7, status:'new', name:(this.state.name||'مهمان'), phone:phoneFmt, created:Date.now(), isNew:true, items };\n      this.setState(s=>({ screen:'success', orderNo:no, confetti:true, submitting:false, orders:[order,...s.orders] }));\n      setTimeout(()=>this.setState({confetti:false}), 2800);\n    }, 1400);\n  }\n  reset(){ this.setState({ screen:'landing', cart:[], name:'', phone:'', phoneErr:false }); this._menuSeen=false; }\n\n  setScrollRef(el){\n    if(el && el!==this._scrollEl){\n      this._scrollEl = el;\n      el.addEventListener('scroll', ()=>this.onMenuScroll(el), {passive:true});\n    }\n  }\n  onMenuScroll(el){\n    const y = el.scrollTop;\n
